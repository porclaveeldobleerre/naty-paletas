<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Galería — Naty Paletas</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:system-ui,sans-serif;background:#f4f6fb;color:#1e293b;min-height:100vh;}
    .header{background:linear-gradient(135deg,#ec4899,#a855f7);padding:20px 24px;color:#fff;display:flex;align-items:center;gap:12px;}
    .header h1{font-size:1.2rem;font-weight:800;}
    .header p{font-size:0.8rem;opacity:.85;margin-top:2px;}
    .container{max-width:640px;margin:0 auto;padding:20px 16px;}

    /* LOGIN */
    .login-box{background:#fff;border-radius:16px;padding:32px 24px;box-shadow:0 4px 20px rgba(0,0,0,0.08);text-align:center;margin-top:40px;}
    .login-box h2{font-size:1.1rem;font-weight:800;margin-bottom:8px;}
    .login-box p{color:#64748b;font-size:0.85rem;margin-bottom:24px;}
    .login-box input{width:100%;padding:12px 16px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:0.9rem;margin-bottom:12px;outline:none;font-family:inherit;}
    .login-box input:focus{border-color:#a855f7;}
    .btn-login{width:100%;background:linear-gradient(135deg,#ec4899,#a855f7);color:#fff;border:none;padding:13px;border-radius:10px;font-size:0.95rem;font-weight:700;cursor:pointer;}
    .error-msg{color:#ef4444;font-size:0.82rem;margin-top:8px;}

    /* PANEL */
    .panel{display:none;}
    .card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.07);margin-bottom:16px;}
    .card h3{font-size:1rem;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px;}

    /* CAMPOS NUEVOS */
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
    .form-group{display:flex;flex-direction:column;gap:5px;}
    .form-group label{font-size:0.75rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.3px;}
    .form-group input,.form-group select{padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:0.88rem;font-family:inherit;outline:none;background:#fff;color:#1e293b;}
    .form-group input:focus,.form-group select:focus{border-color:#a855f7;}
    .tipo-btns{display:flex;gap:6px;}
    .tipo-btn{flex:1;padding:9px 6px;border:2px solid #e2e8f0;border-radius:9px;background:#fff;font-size:0.78rem;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;font-family:inherit;}
    .tipo-btn.sel-agua{border-color:#0ea5e9;background:#e0f2fe;color:#0369a1;}
    .tipo-btn.sel-crema{border-color:#ec4899;background:#fce7f3;color:#be185d;}
    .tipo-btn.sel-galeria{border-color:#a855f7;background:#f3e8ff;color:#7e22ce;}

    /* UPLOAD */
    .upload-area{border:2px dashed #e2e8f0;border-radius:12px;padding:28px 16px;text-align:center;cursor:pointer;transition:all .2s;position:relative;}
    .upload-area:hover,.upload-area.drag{border-color:#a855f7;background:#faf5ff;}
    .upload-area i{font-size:2.2rem;color:#a855f7;margin-bottom:10px;display:block;}
    .upload-area p{color:#64748b;font-size:0.85rem;}
    .upload-area strong{color:#a855f7;}
    .upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
    .progress{background:#f1f5f9;border-radius:999px;height:8px;margin-top:12px;overflow:hidden;display:none;}
    .progress-bar{height:100%;background:linear-gradient(135deg,#ec4899,#a855f7);border-radius:999px;width:0%;transition:width .3s;}
    .upload-status{font-size:0.82rem;color:#64748b;margin-top:8px;text-align:center;}

    /* GRID ADMIN */
    .admin-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
    .foto-item{background:#f8fafc;border-radius:12px;overflow:hidden;border:1.5px solid #e2e8f0;}
    .foto-item-img{position:relative;aspect-ratio:3/4;}
    .foto-item-img img{width:100%;height:100%;object-fit:cover;}
    .foto-tipo-badge{position:absolute;top:7px;left:7px;font-size:0.65rem;font-weight:800;padding:3px 9px;border-radius:999px;}
    .badge-agua{background:rgba(14,165,233,0.9);color:#fff;}
    .badge-crema{background:rgba(236,72,153,0.9);color:#fff;}
    .badge-galeria{background:rgba(100,116,139,0.85);color:#fff;}
    .btn-del-abs{position:absolute;top:7px;right:7px;background:#ef4444;color:#fff;border:none;border-radius:7px;padding:5px 9px;cursor:pointer;font-size:0.75rem;font-weight:700;opacity:0;transition:opacity .2s;}
    .foto-item:hover .btn-del-abs{opacity:1;}
    .foto-item-meta{padding:8px 10px;display:flex;flex-direction:column;gap:5px;}
    .meta-input{width:100%;padding:6px 9px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:0.75rem;font-family:inherit;outline:none;background:#fff;}
    .meta-input:focus{border-color:#a855f7;}
    .meta-select{width:100%;padding:6px 9px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:0.75rem;font-family:inherit;outline:none;background:#fff;cursor:pointer;}
    .empty-galeria{text-align:center;color:#94a3b8;padding:32px;font-size:0.88rem;grid-column:1/-1;}

    .btn-guardar{width:100%;background:linear-gradient(135deg,#ec4899,#a855f7);color:#fff;border:none;padding:14px;border-radius:10px;font-size:1rem;font-weight:800;cursor:pointer;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px;}
    .btn-guardar:disabled{opacity:.6;cursor:not-allowed;}
    .btn-salir{background:#f1f5f9;color:#64748b;border:none;padding:10px 20px;border-radius:10px;font-size:0.85rem;font-weight:600;cursor:pointer;margin-top:8px;width:100%;}
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:12px 24px;border-radius:10px;font-weight:700;font-size:0.88rem;z-index:999;display:none;box-shadow:0 4px 20px rgba(0,0,0,0.2);}
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>🍡 Naty Paletas — Catálogo</h1>
    <p>Administra paletas y fotos de la galería</p>
  </div>
</div>

<!-- LOGIN -->
<div class="container" id="loginSection">
  <div class="login-box">
    <div style="font-size:3rem;margin-bottom:12px;">🔒</div>
    <h2>Acceso al panel</h2>
    <p>Solo personal autorizado de Naty Paletas</p>
    <input type="password" id="pinInput" placeholder="Ingresa el PIN de acceso" maxlength="20">
    <button class="btn-login" onclick="verificarPin()">Entrar</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<!-- PANEL -->
<div class="container panel" id="panelSection">

  <!-- SUBIR FOTO -->
  <div class="card">
    <h3><i class="fas fa-cloud-upload-alt" style="color:#a855f7;"></i> Agregar paleta o foto</h3>

    <!-- Tipo -->
    <div style="margin-bottom:12px;">
      <div style="font-size:0.75rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.3px;margin-bottom:7px;">Categoría</div>
      <div class="tipo-btns">
        <button class="tipo-btn sel-agua" id="tbAgua" onclick="selTipo('agua')">💧 De Agua</button>
        <button class="tipo-btn" id="tbCrema" onclick="selTipo('crema')">🍦 De Crema</button>
        <button class="tipo-btn" id="tbGaleria" onclick="selTipo('galeria')">📷 Galería</button>
      </div>
    </div>

    <!-- Nombre del sabor -->
    <div class="form-group" style="margin-bottom:12px;">
      <label>Nombre del sabor / título</label>
      <input type="text" id="inputNombre" placeholder="Ej: Limón, Fresa con Crema, Oreo...">
    </div>

    <!-- Descripción -->
    <div class="form-group" style="margin-bottom:14px;">
      <label>Descripción (opcional)</label>
      <input type="text" id="inputDesc" placeholder="Ej: Refrescante y natural">
    </div>

    <!-- Upload -->
    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept="image/*" multiple onchange="subirFotos(this.files)">
      <i class="fas fa-image"></i>
      <p>Toca aquí para seleccionar la foto<br><strong>o arrastra desde tu galería</strong></p>
      <p style="font-size:0.75rem;margin-top:8px;color:#94a3b8;">JPG, PNG, WEBP — máx 10MB</p>
    </div>
    <div class="progress" id="progressBar"><div class="progress-bar" id="progressFill"></div></div>
    <div class="upload-status" id="uploadStatus"></div>
  </div>

  <!-- LISTA ACTUAL -->
  <div class="card">
    <h3><i class="fas fa-images" style="color:#ec4899;"></i> Paletas y fotos <span id="contadorFotos" style="font-size:0.75rem;color:#94a3b8;font-weight:500;"></span></h3>
    <div class="admin-grid" id="galeriaAdmin"></div>
  </div>

  <button class="btn-guardar" id="btnGuardar" onclick="guardarGaleria()">
    <i class="fas fa-save"></i> Guardar cambios en el sitio
  </button>
  <button class="btn-salir" onclick="cerrarSesion()">Cerrar sesión</button>
</div>

<div class="toast" id="toast"></div>

<script>
const CLOUD_NAME = 'dfv1qc74g';
const UPLOAD_PRESET = 'naty-galeria';
const PIN = 'naty2026';

var fotos = [];
var tipoSeleccionado = 'agua';

function selTipo(t) {
  tipoSeleccionado = t;
  document.getElementById('tbAgua').className = 'tipo-btn' + (t==='agua' ? ' sel-agua' : '');
  document.getElementById('tbCrema').className = 'tipo-btn' + (t==='crema' ? ' sel-crema' : '');
  document.getElementById('tbGaleria').className = 'tipo-btn' + (t==='galeria' ? ' sel-galeria' : '');
}

function verificarPin() {
  var pin = document.getElementById('pinInput').value.trim();
  if (pin === PIN) {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('panelSection').style.display = 'block';
    cargarGaleria();
  } else {
    document.getElementById('errorMsg').textContent = 'PIN incorrecto, intenta de nuevo.';
  }
}

document.getElementById('pinInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') verificarPin();
});

function cerrarSesion() {
  document.getElementById('loginSection').style.display = 'block';
  document.getElementById('panelSection').style.display = 'none';
  document.getElementById('pinInput').value = '';
}

function cargarGaleria() {
  fetch('galeria.json?t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      fotos = Array.isArray(data) ? data : (data.fotos || []);
      renderGaleria();
    })
    .catch(function() { fotos = []; renderGaleria(); });
}

function renderGaleria() {
  var grid = document.getElementById('galeriaAdmin');
  var contador = document.getElementById('contadorFotos');
  contador.textContent = '(' + fotos.length + ' entradas)';
  if (!fotos.length) {
    grid.innerHTML = '<div class="empty-galeria"><i class="fas fa-images" style="font-size:2rem;display:block;margin-bottom:8px;"></i>No hay fotos aún.</div>';
    return;
  }
  grid.innerHTML = fotos.map(function(f, i) {
    var tipo = f.tipo || 'galeria';
    var badgeClass = tipo === 'agua' ? 'badge-agua' : tipo === 'crema' ? 'badge-crema' : 'badge-galeria';
    var badgeLabel = tipo === 'agua' ? '💧 Agua' : tipo === 'crema' ? '🍦 Crema' : '📷 Galería';
    return '<div class="foto-item">' +
      '<div class="foto-item-img">' +
        '<img src="' + f.imagen + '" alt="' + (f.titulo||'') + '" onerror="this.src=\'https://images.unsplash.com/photo-1587314168485-3236d6710814?w=300&h=400&fit=crop\'">' +
        '<span class="foto-tipo-badge ' + badgeClass + '">' + badgeLabel + '</span>' +
        '<button class="btn-del-abs" onclick="eliminarFoto(' + i + ')"><i class="fas fa-trash"></i></button>' +
      '</div>' +
      '<div class="foto-item-meta">' +
        '<input class="meta-input" value="' + (f.titulo||'') + '" placeholder="Nombre del sabor..." onchange="fotos[' + i + '].titulo=this.value">' +
        '<input class="meta-input" value="' + (f.descripcion||'') + '" placeholder="Descripción..." onchange="fotos[' + i + '].descripcion=this.value">' +
        '<select class="meta-select" onchange="fotos[' + i + '].tipo=this.value">' +
          '<option value="agua"' + (tipo==='agua'?' selected':'') + '>💧 De Agua</option>' +
          '<option value="crema"' + (tipo==='crema'?' selected':'') + '>🍦 De Crema</option>' +
          '<option value="galeria"' + (tipo==='galeria'?' selected':'') + '>📷 Galería</option>' +
        '</select>' +
      '</div>' +
    '</div>';
  }).join('');
}

function subirFotos(files) {
  if (!files.length) return;
  var nombre = document.getElementById('inputNombre').value.trim();
  var desc = document.getElementById('inputDesc').value.trim();
  var progress = document.getElementById('progressBar');
  var fill = document.getElementById('progressFill');
  var status = document.getElementById('uploadStatus');
  progress.style.display = 'block';
  fill.style.width = '0%';
  var total = files.length;
  var done = 0;

  Array.from(files).forEach(function(file, idx) {
    var fd = new FormData();
    fd.append('file', file);
    fd.append('upload_preset', UPLOAD_PRESET);
    fd.append('folder', 'naty-galeria');
    status.textContent = 'Subiendo ' + (done+1) + ' de ' + total + '...';

    var xhr = new XMLHttpRequest();
    xhr.open('POST', 'https://api.cloudinary.com/v1_1/' + CLOUD_NAME + '/image/upload');
    xhr.onload = function() {
      done++;
      fill.style.width = (done/total*100) + '%';
      if (xhr.status === 200) {
        var res = JSON.parse(xhr.responseText);
        var tituloFinal = nombre || file.name.replace(/\.[^.]+$/, '');
        fotos.push({
          imagen: res.secure_url,
          titulo: tituloFinal,
          tipo: tipoSeleccionado,
          descripcion: desc
        });
        renderGaleria();
      }
      if (done === total) {
        status.textContent = '✅ ' + total + ' foto(s) subida(s). Guarda los cambios.';
        document.getElementById('inputNombre').value = '';
        document.getElementById('inputDesc').value = '';
        setTimeout(function() { progress.style.display='none'; status.textContent=''; }, 4000);
      }
    };
    xhr.onerror = function() {
      done++;
      status.textContent = '❌ Error al subir una foto.';
    };
    xhr.send(fd);
  });
}

function eliminarFoto(i) {
  if (!confirm('¿Eliminar "' + (fotos[i].titulo||'esta foto') + '"?')) return;
  fotos.splice(i, 1);
  renderGaleria();
  mostrarToast('Eliminado — guarda los cambios');
}

function guardarGaleria() {
  var btn = document.getElementById('btnGuardar');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';
  localStorage.setItem('naty_galeria', JSON.stringify(fotos));
  var contenido = JSON.stringify(fotos, null, 2);

  var token = localStorage.getItem('naty_gh');
  if (!token) {
    token = prompt('Primera configuración:\nIngresa el código de acceso que te dio el administrador:');
    if (!token) { btn.disabled=false; btn.innerHTML='<i class="fas fa-save"></i> Guardar cambios en el sitio'; return; }
    localStorage.setItem('naty_gh', token);
  }

  fetch('https://api.github.com/repos/porclaveeldobleerre/naty-paletas/contents/galeria.json', {
    headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' }
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    return fetch('https://api.github.com/repos/porclaveeldobleerre/naty-paletas/contents/galeria.json', {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: 'Actualizar catálogo desde panel',
        content: btoa(unescape(encodeURIComponent(contenido))),
        sha: data.sha
      })
    });
  })
  .then(function(r) {
    if (r.ok) {
      mostrarToast('✅ ¡Catálogo actualizado! El sitio se actualiza en ~1 minuto');
    } else {
      localStorage.removeItem('naty_gh');
      mostrarToast('❌ Error de permisos. Recarga e intenta de nuevo.');
    }
  })
  .catch(function() { mostrarToast('❌ Error de conexión. Intenta de nuevo.'); })
  .finally(function() {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-save"></i> Guardar cambios en el sitio';
  });
}

function mostrarToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(function() { t.style.display='none'; }, 4000);
}
</script>
</body>
</html>
