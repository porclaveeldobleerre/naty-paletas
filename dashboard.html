<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Naty Paletas y Helados | Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="app">

  <!-- Overlay para cerrar sidebar en móvil -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">

    <!-- LOGO NATY -->
    <div class="logo">
      <img src="assets/logo2.png" alt="Naty" style="width:38px;height:38px;object-fit:contain;border-radius:8px;flex-shrink:0;"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="logo-icon" style="display:none;">🍡</div>
      <div>
        <strong>Naty Paletas</strong>
        <small>Paletas y Helados</small>
      </div>
    </div>

    <nav>
      <div class="nav-label">Principal</div>
      <a class="nav-link active" data-section="inicio">
        <i class="fas fa-gauge-high"></i><span>Dashboard</span>
      </a>
      <a class="nav-link" data-section="insumos">
        <i class="fas fa-flask"></i><span>Insumos</span>
      </a>
      <a class="nav-link" data-section="recetas">
        <i class="fas fa-book-open"></i><span>Recetas</span>
      </a>
      <a class="nav-link" data-section="inventario">
        <i class="fas fa-boxes-stacked"></i><span>Inventario</span>
      </a>

      <div class="nav-label">Producción</div>
      <a class="nav-link" data-section="produccion">
        <i class="fas fa-industry"></i><span>Producción</span>
      </a>

      <div class="nav-label">Comercial</div>
      <a class="nav-link" data-section="ventas">
        <i class="fas fa-cash-register"></i><span>Ventas</span>
      </a>
      <a class="nav-link" data-section="reportes">
        <i class="fas fa-chart-pie"></i><span>Reportes</span>
      </a>
      <a class="nav-link" data-section="proveedores">
        <i class="fas fa-truck-fast"></i><span>Proveedores</span>
      </a>

      <div class="nav-label">Sistema</div>
      <a class="nav-link" data-section="configuracion">
        <i class="fas fa-sliders"></i><span>Configuración</span>
      </a>
      <a class="nav-link" data-section="usuarios">
        <i class="fas fa-user-shield"></i><span>Usuarios</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-user-avatar" id="sidebarAvatar">A</div>
        <div>
          <div class="sidebar-user-name" id="sidebarName">Admin</div>
          <div class="sidebar-user-role" id="sidebarRole">Administrador</div>
        </div>
      </div>
      <button id="logout" class="btn-logout">
        <i class="fas fa-right-from-bracket"></i><span>Cerrar sesión</span>
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOPBAR -->
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle">
        <i class="fas fa-bars"></i>
      </button>
      <h1 id="topbarTitle">Dashboard</h1>

      <div class="topbar-right">
        <div class="topbar-search">
          <i class="fas fa-magnifying-glass"></i>
          <input type="text" placeholder="Buscar...">
        </div>

        <div style="position:relative;">
          <button class="notif-btn" id="notifBtn" title="Notificaciones">
            <i class="fas fa-bell"></i>
            <span class="notif-badge" id="notifBadge" style="display:none;">0</span>
          </button>
          <div class="notif-dropdown" id="notifDropdown">
            <div class="notif-header">Alertas del sistema</div>
            <div id="notifList"></div>
          </div>
        </div>

        <button class="theme-toggle" id="themeToggle" title="Cambiar tema">
          <i class="fas fa-moon" id="themeIcon"></i>
        </button>

        <div class="user-badge">
          <div class="user-avatar" id="userAvatar">A</div>
          <div>
            <div style="font-size:0.78rem;font-weight:700;color:var(--text);" id="userEmail">Admin</div>
            <div style="font-size:0.62rem;color:var(--text3);" id="userRolLabel">Administrador</div>
          </div>
        </div>

        <!-- Botón cerrar sesión visible en topbar también -->
        <button id="logoutTopbar" title="Cerrar sesión"
          style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:9px;
            padding:7px 12px;cursor:pointer;color:#ef4444;font-size:0.78rem;font-weight:700;
            display:flex;align-items:center;gap:6px;transition:all .15s;font-family:inherit;"
          onmouseover="this.style.background='rgba(239,68,68,0.2)'"
          onmouseout="this.style.background='rgba(239,68,68,0.1)'">
          <i class="fas fa-right-from-bracket"></i>
          <span>Salir</span>
        </button>
      </div>
    </header>

    <div id="panel" class="panel-content"></div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="sections-js/Insumos.js"></script>
<script src="sections-js/inventario.js"></script>
<script src="sections-js/Recetas.js"></script>
<script src="sections-js/produccion.js"></script>
<script src="sections-js/reportes.js"></script>
<script src="sections-js/configuracion.js"></script>
<script src="sections-js/usuarios.js"></script>
<script src="sections-js/ventas.js"></script>
<script src="sections-js/proveedores.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
