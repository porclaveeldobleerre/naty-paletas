backend:
  name: git-gateway
  branch: main

media_folder: "assets"
public_folder: "assets"

locale: es

collections:
  - name: "galeria"
    label: "📸 Galería de Fotos"
    files:
      - name: "fotos"
        label: "Fotos de la Galería"
        file: "galeria.json"
        fields:
          - name: "fotos"
            label: "Fotos"
            widget: "list"
            label_singular: "Foto"
            fields:
              - { label: "Foto", name: "imagen", widget: "image", hint: "Sube una foto desde tu galería" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Descripción", name: "descripcion", widget: "string", required: false }
