backend:
  name: git-gateway
  branch: main

media_folder: "assets"
public_folder: "assets"

locale: es

collections:
  - name: "galeria"
    label: "Galería de Fotos"
    label_singular: "Foto"
    folder: "_galeria"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Foto", name: "image", widget: "image" }
      - { label: "Descripción", name: "alt", widget: "string", required: false }
