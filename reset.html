<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Nueva Contraseña - Dulce Gestión</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<main class="app" style="grid-template-columns:1fr;">
  <section class="card right" style="max-width:440px;margin:auto;">

    <div class="login-icon">
      <i class="fas fa-lock"></i>
    </div>

    <h1 style="text-align:center;">Nueva contraseña</h1>
    <p class="subtitle">Ingresa tu nueva contraseña para continuar</p>

    <div id="formReset" class="w-100">
      <div class="form-group w-100">
        <label>Nueva contraseña</label>
        <div class="input-group input-helado">
          <div class="input-group-prepend">
            <span class="input-group-text"><i class="fas fa-snowflake"></i></span>
          </div>
          <input type="password" id="nuevaPass" class="form-control" placeholder="••••••••">
        </div>
      </div>

      <div class="form-group w-100">
        <label>Confirmar contraseña</label>
        <div class="input-group input-helado">
          <div class="input-group-prepend">
            <span class="input-group-text"><i class="fas fa-snowflake"></i></span>
          </div>
          <input type="password" id="confirmarPass" class="form-control" placeholder="••••••••">
        </div>
      </div>

      <button class="login-btn" id="btnGuardarPass">
        <i class="fas fa-check mr-2"></i> Guardar contraseña
      </button>
      <p id="msgReset" style="margin-top:12px;text-align:center;font-size:14px;"></p>
    </div>

    <div id="tokenInvalido" style="display:none;text-align:center;">
      <p style="color:#e11d48;margin-bottom:8px;">El enlace ha expirado o no es válido.</p>
      <p style="color:#6b7280;font-size:0.85rem;margin-bottom:16px;">Serás redirigido al inicio en 3 segundos...</p>
      <a href="index.html" class="login-btn" style="display:inline-block;text-decoration:none;">Volver al inicio</a>
    </div>

  </section>
</main>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const tokenURL = params.get('reset');
    const emailURL = params.get('email');
    const expiraURL = params.get('exp');

    // Validar que el link tenga los datos y no haya expirado
    if (!tokenURL || !emailURL || !expiraURL || Date.now() > parseInt(expiraURL)) {
      document.getElementById('formReset').style.display = 'none';
      document.getElementById('tokenInvalido').style.display = 'block';
      // Redirigir al login después de 3 segundos
      setTimeout(() => { window.location.replace('index.html'); }, 3000);
      return;
    }

    document.getElementById('btnGuardarPass').addEventListener('click', () => {
      const nueva = document.getElementById('nuevaPass').value;
      const confirmar = document.getElementById('confirmarPass').value;
      const msg = document.getElementById('msgReset');

      if (!nueva || !confirmar) {
        msg.style.color = '#e11d48';
        msg.textContent = 'Completa ambos campos.';
        return;
      }
      if (nueva !== confirmar) {
        msg.style.color = '#e11d48';
        msg.textContent = 'Las contraseñas no coinciden.';
        return;
      }
      if (nueva.length < 6) {
        msg.style.color = '#e11d48';
        msg.textContent = 'Mínimo 6 caracteres.';
        return;
      }

      localStorage.setItem(`pass_${emailURL}`, nueva);

      msg.style.color = '#16a34a';
      msg.textContent = '✅ Contraseña actualizada. Redirigiendo...';

      setTimeout(() => {
        window.location.href = 'index.html';
      }, 2000);
    });
  });
</script>

</body>
</html>
