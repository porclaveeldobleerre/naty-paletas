<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Naty Paletas y Helados</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ec4899">

  <!-- Bootstrap 4 -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Burbujas de hielo animadas -->
<div class="bubble" style="width:80px;height:80px;left:5%;animation-duration:12s;animation-delay:0s;"></div>
<div class="bubble" style="width:40px;height:40px;left:15%;animation-duration:9s;animation-delay:2s;"></div>
<div class="bubble" style="width:120px;height:120px;left:30%;animation-duration:15s;animation-delay:1s;"></div>
<div class="bubble" style="width:60px;height:60px;left:50%;animation-duration:10s;animation-delay:3s;"></div>
<div class="bubble" style="width:90px;height:90px;left:65%;animation-duration:13s;animation-delay:0.5s;"></div>
<div class="bubble" style="width:50px;height:50px;left:80%;animation-duration:8s;animation-delay:4s;"></div>
<div class="bubble" style="width:100px;height:100px;left:90%;animation-duration:11s;animation-delay:1.5s;"></div>
<div class="bubble" style="width:30px;height:30px;left:45%;animation-duration:7s;animation-delay:5s;"></div>

<main class="app">

  <!-- CARD IZQUIERDA -->
  <section class="card left">

    <!-- Título arriba -->
    <div style="position:relative;z-index:1;text-align:center;margin-bottom:18px;">
      <div style="font-size:0.72rem;font-weight:800;color:rgba(255,255,255,0.6);
        text-transform:uppercase;letter-spacing:3px;margin-bottom:4px;">Bienvenido a</div>
      <div style="font-size:2rem;font-weight:900;color:#fff;line-height:1;
        text-shadow:0 2px 12px rgba(0,0,0,0.3);">Paletería</div>
      <div style="font-size:2.8rem;font-weight:900;
        background:linear-gradient(135deg,#ff3d9a,#fbbf24);
        -webkit-background-clip:text;-webkit-text-fill-color:transparent;
        background-clip:text;line-height:1;letter-spacing:2px;">NATY</div>
    </div>

    <!-- Niña comiendo helado -->
    <div style="position:relative;z-index:1;width:100%;">
      <img src="assets/naty-nina.jpeg" alt="Niña feliz con helado Naty"
        style="width:100%;height:300px;object-fit:cover;object-position:center 10%;
          border-radius:18px;box-shadow:0 12px 40px rgba(0,0,0,0.35);">
      <div style="position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);
        background:linear-gradient(135deg,#ec4899,#f97316);
        color:#fff;padding:8px 22px;border-radius:999px;
        font-weight:800;font-size:0.8rem;white-space:nowrap;
        box-shadow:0 4px 16px rgba(236,72,153,0.5);">
        😊 ¡Así de felices nos ponen!
      </div>
    </div>

    <!-- Eslogan -->
    <div style="position:relative;z-index:1;margin-top:28px;text-align:center;">
      <p style="color:rgba(255,255,255,0.9);font-size:0.95rem;font-weight:600;line-height:1.6;margin:0;">
        🍡 <em>Date el gusto...</em><br>
        <strong style="color:#fbbf24;">nosotros ponemos el sabor</strong>
      </p>
    </div>

  </section>

  <!-- CARD DERECHA -->
  <section class="card right">

    <div class="login-icon">
      <i class="fas fa-ice-cream"></i>
    </div>

    <h1>Iniciar Sesión</h1>
    <p class="subtitle">Naty Paletas y Helados — Panel de Control</p>

    <!-- FORM ÚNICO -->
<form id="loginForm">

  <!-- CORREO -->
  <div class="form-group w-100">
    <label>Correo electrónico</label>
    <div class="input-group input-helado">
      <div class="input-group-prepend">
        <span class="input-group-text">
          <i class="fas fa-ice-cream"></i>
        </span>
      </div>
      <input 
        type="email"
        id="email"
        class="form-control"
        placeholder="usuario@empresa.com"
        required
      >
    </div>
  </div>

  <!-- CONTRASEÑA -->
  <div class="form-group w-100">
    <label>Contraseña</label>
    <div class="input-group input-helado">
      <div class="input-group-prepend">
        <span class="input-group-text">
          <i class="fas fa-snowflake"></i>
        </span>
      </div>
      <input 
        type="password"
        id="password"
        class="form-control"
        placeholder="••••••••"
        required
      >
    </div>
  </div>

      <button type="submit" class="login-btn">
        <i class="fas fa-ice-cream mr-2"></i>
        Iniciar Sesión
      </button>

      <a href="#" class="forgot" id="btnForgot">¿Olvidaste tu contraseña?</a>

    </form>

  </section>

</main>

<!-- MODAL RECUPERAR CONTRASEÑA -->
<div id="modalRecuperar" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div class="login-icon" style="margin:0 auto 16px;">
      <i class="fas fa-key"></i>
    </div>
    <h2 style="text-align:center;margin-bottom:6px;">Recuperar contraseña</h2>
    <p class="subtitle" style="margin-bottom:20px;">Elige cómo recibir tu enlace</p>

    <!-- SELECTOR MÉTODO -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;width:100%;">
      <button id="btnMetodoEmail" onclick="window.seleccionarMetodo('email')"
        style="padding:10px 6px;border-radius:12px;border:2px solid #ec4899;background:rgba(236,72,153,0.1);cursor:pointer;font-weight:700;font-size:0.72rem;color:#ec4899;">
        <i class="fas fa-envelope" style="display:block;font-size:1.1rem;margin-bottom:4px;"></i>CORREO
      </button>
      <button id="btnMetodoPalabra" onclick="window.seleccionarMetodo('palabra')"
        style="padding:10px 6px;border-radius:12px;border:2px solid #e5e7eb;background:transparent;cursor:pointer;font-weight:700;font-size:0.72rem;color:#64748b;">
        <i class="fas fa-shield-halved" style="display:block;font-size:1.1rem;margin-bottom:4px;"></i>PALABRA SECRETA
      </button>
    </div>

    <!-- INPUT CORREO -->
    <div id="inputEmail" class="form-group w-100">
      <label>Correo electrónico</label>
      <div class="input-group input-helado">
        <div class="input-group-prepend">
          <span class="input-group-text"><i class="fas fa-envelope"></i></span>
        </div>
        <input type="email" id="recoverEmail" class="form-control" placeholder="usuario@empresa.com">
      </div>
    </div>

    <!-- INPUT PALABRA SECRETA -->
    <div id="inputPalabra" class="form-group w-100" style="display:none;">
      <label>Correo del usuario</label>
      <div class="input-group input-helado mb-2">
        <div class="input-group-prepend">
          <span class="input-group-text"><i class="fas fa-user"></i></span>
        </div>
        <input type="email" id="recoverEmailPalabra" class="form-control" placeholder="usuario@empresa.com">
      </div>
      <label>¿Cuál es el nombre de tu perro?</label>
      <div class="input-group input-helado">
        <div class="input-group-prepend">
          <span class="input-group-text"><i class="fas fa-shield-halved"></i></span>
        </div>
        <input type="text" id="respuestaSecreta" class="form-control" placeholder="Respuesta secreta">
      </div>
    </div>

    <button class="login-btn" id="btnEnviarRecuperar">
      <i class="fas fa-paper-plane mr-2"></i> Enviar enlace
    </button>
    <p id="msgRecuperar" style="margin-top:12px;text-align:center;font-size:14px;"></p>

    <a href="#" class="forgot" id="btnCerrarModal" style="margin-top:12px;">Cancelar</a>
  </div>
</div>

<!-- MODAL NUEVA CONTRASEÑA -->
<div id="modalNuevaPass" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div class="login-icon" style="margin:0 auto 16px;">
      <i class="fas fa-lock"></i>
    </div>
    <h2 style="text-align:center;margin-bottom:6px;">Nueva contraseña</h2>
    <p class="subtitle" style="margin-bottom:20px;">Ingresa tu nueva contraseña</p>

    <div class="form-group w-100">
      <label>Nueva contraseña</label>
      <div class="input-group input-helado">
        <div class="input-group-prepend">
          <span class="input-group-text"><i class="fas fa-snowflake"></i></span>
        </div>
        <input type="password" id="nuevaPass" class="form-control" placeholder="••••••••">
      </div>
    </div>
    <div class="form-group w-100">
      <label>Confirmar contraseña</label>
      <div class="input-group input-helado">
        <div class="input-group-prepend">
          <span class="input-group-text"><i class="fas fa-snowflake"></i></span>
        </div>
        <input type="password" id="confirmarPass" class="form-control" placeholder="••••••••">
      </div>
    </div>
    <button class="login-btn" id="btnGuardarPass">
      <i class="fas fa-check mr-2"></i> Guardar contraseña
    </button>
    <p id="msgNuevaPass" style="margin-top:12px;text-align:center;font-size:14px;"></p>
  </div>
</div>

<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
  window.metodoRecuperar = 'email';

  window.seleccionarMetodo = function(metodo) {
    window.metodoRecuperar = metodo;

    var e = document.getElementById('inputEmail');
    var p = document.getElementById('inputPalabra');
    var be = document.getElementById('btnMetodoEmail');
    var bp = document.getElementById('btnMetodoPalabra');

    if (!e || !p || !be || !bp) return;

    e.style.display  = metodo === 'email'   ? 'block' : 'none';
    p.style.display  = metodo === 'palabra' ? 'block' : 'none';

    be.style.borderColor = metodo === 'email'   ? '#ec4899' : '#e5e7eb';
    be.style.background  = metodo === 'email'   ? 'rgba(236,72,153,0.1)' : 'transparent';
    be.style.color       = metodo === 'email'   ? '#ec4899' : '#64748b';

    bp.style.borderColor = metodo === 'palabra' ? '#ec4899' : '#e5e7eb';
    bp.style.background  = metodo === 'palabra' ? 'rgba(236,72,153,0.1)' : 'transparent';
    bp.style.color       = metodo === 'palabra' ? '#ec4899' : '#64748b';
  };
</script>
<script src="app.js"></script>
</body>
</html>
